# Hardware Configuration Template
# Copy this file and fill in your hardware details before running benchmarks.
# Save as: hardware_<your_name>.yaml

experimenter: "Your Name"
date: "2025-01-27"
institution: "Your Institution"

hardware:
  gpu:
    model: "NVIDIA RTX 3090"  # nvidia-smi --query-gpu=name --format=csv,noheader
    count: 1
    memory_gb: 24
    driver_version: "535.104.05"  # nvidia-smi --query-gpu=driver_version --format=csv,noheader

  cpu:
    model: "Intel Core i9-10900K"  # lscpu | grep "Model name" (Linux) or sysctl -n machdep.cpu.brand_string (macOS)
    cores: 10  # physical cores
    threads: 20  # logical cores with hyperthreading

  memory:
    ram_gb: 64
    type: "DDR4"
    speed_mhz: 3200

  storage:
    type: "NVMe SSD"  # or "SATA SSD", "HDD"
    model: "Samsung 980 Pro"

software:
  os: "Ubuntu 22.04"
  cuda_version: "11.8"
  cudnn_version: "8.6"
  python_version: "3.9"

environment:
  # Power settings
  gpu_power_limit_w: null  # null = default, or specify wattage
  cpu_governor: "performance"  # or "powersave", "ondemand"

  # Cooling
  cooling_type: "air"  # or "liquid", "passive"
  ambient_temp_c: 22

notes: |
  Any additional notes about the setup, e.g.:
  - Running in a shared cluster
  - Other processes running during benchmark
  - Any hardware modifications
